name: Sync Wiki

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'images/**'
      - '*.md'
      - '.github/workflows/sync-wiki.yml'
  workflow_dispatch:  # 手动触发

permissions:
  contents: write

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Prepare flattened wiki files
        run: |
          echo "📦 准备扁平化的 Wiki 文件..."
          
          # 创建临时目录
          mkdir -p wiki-output
          
          # 复制 images 文件夹
          if [ -d "images" ]; then
            cp -r images wiki-output/
          fi
          
          # 处理根目录的 MD 文件
          for file in *.md; do
            if [ -f "$file" ]; then
              if [ "$file" = "README.md" ]; then
                cp "$file" wiki-output/Home.md
                echo "  根目录: $file -> Home.md"
              else
                cp "$file" "wiki-output/$file"
                echo "  根目录: $file -> $file"
              fi
            fi
          done
          
          # 处理 docs 目录下的文件（扁平化）
          if [ -d "docs" ]; then
            find docs -name "*.md" -type f | while read file; do
              # 移除 docs/ 前缀和 .md 后缀
              relative="${file#docs/}"
              relative="${relative%.md}"
              # 替换 / 为 -
              flat_name="${relative//\//-}"
              
              cp "$file" "wiki-output/${flat_name}.md"
              echo "  docs: $file -> ${flat_name}.md"
            done
          fi
          
          echo "✅ 文件准备完成"
          ls -la wiki-output/
      
      - name: Update links in wiki files
        run: |
          echo "📝 更新链接引用..."
          
          cd wiki-output
          
          for md_file in *.md; do
            if [ -f "$md_file" ]; then
              # 使用 perl 替代 sed，更可靠地处理链接
              perl -i -pe '
                # 更新 docs/tutorials/ 链接
                s/\[([^\]]+)\]\(\.?\/?docs\/tutorials\/([^)\.]+)(\.md)?\)/[$1](tutorials-$2)/g;
                # 更新 docs/features/ 链接
                s/\[([^\]]+)\]\(\.?\/?docs\/features\/([^)\.]+)(\.md)?\)/[$1](features-$2)/g;
                # 更新 docs/development/ 链接
                s/\[([^\]]+)\]\(\.?\/?docs\/development\/([^)\.]+)(\.md)?\)/[$1](development-$2)/g;
                # 更新 docs/CONTRIBUTING 链接
                s/\[([^\]]+)\]\(\.?\/?docs\/CONTRIBUTING(\.md)?\)/[$1](CONTRIBUTING)/g;
                # 更新 README 链接为 Home
                s/\[([^\]]+)\]\(\.?\/?README(\.md)?\)/[$1](Home)/g;
              ' "$md_file"
              
              echo "  已处理: $md_file"
            fi
          done
          
          echo "✅ 链接更新完成"
      
      - name: Sync to SVL-Wiki Wiki
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "📦 同步到 SVL-Wiki Wiki..."
          
          # 克隆 Wiki 仓库
          git clone https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.wiki.git wiki-temp
          
          # 进入目录
          cd wiki-temp
          
          # 删除旧文件（保留 .git 目录以保持历史）
          find . -maxdepth 1 -not -name '.git' -not -name '.' | xargs rm -rf
          
          # 复制扁平化后的文件（使用绝对路径）
          cp -r ${GITHUB_WORKSPACE}/wiki-output/* .
          
          # 提交
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "docs: 自动同步 - $(date '+%Y-%m-%d %H:%M:%S')"
          
          # 拉取远程更改并推送（保持历史）
          git pull --rebase https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.wiki.git master || true
          git push https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.wiki.git HEAD:master
          
          echo "✅ SVL-Wiki Wiki 同步完成"

      - name: Sync to SVL-StardewValleyLauncher Wiki
        env:
          SSH_KEY: ${{ secrets.SVL_WIKI_SSH_KEY }}
        run: |
          echo "📦 同步到 SVL-StardewValleyLauncher Wiki..."
          
          if [ -z "$SSH_KEY" ]; then
            echo "⚠️ SVL_WIKI_SSH_KEY 未配置，跳过此仓库"
            echo "请在 Settings > Secrets 中添加 SVL_WIKI_SSH_KEY"
            exit 0
          fi
          
          # 配置 SSH
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          
          # 克隆 Wiki 仓库 (SSH)
          git clone git@github.com:panda-lsy/SVL-StardewValleyLauncher.wiki.git launcher-wiki-temp
          
          # 进入目录
          cd launcher-wiki-temp
          
          # 删除旧文件（保留 .git 目录以保持历史）
          find . -maxdepth 1 -not -name '.git' -not -name '.' | xargs rm -rf
          
          # 复制扁平化后的文件（使用绝对路径）
          cp -r ${GITHUB_WORKSPACE}/wiki-output/* .
          
          # 提交
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "docs: 自动同步 - $(date '+%Y-%m-%d %H:%M:%S')"
          
          # 拉取远程更改并推送（保持历史）
          git pull --rebase git@github.com:panda-lsy/SVL-StardewValleyLauncher.wiki.git master || true
          git push git@github.com:panda-lsy/SVL-StardewValleyLauncher.wiki.git HEAD:master
          
          echo "✅ SVL-StardewValleyLauncher Wiki 同步完成"

      - name: Sync to Gitee Wiki
        env:
          GITEE_SSH_KEY: ${{ secrets.GITEE_SSH_KEY }}
        run: |
          echo "📦 同步到 Gitee Wiki..."
          
          if [ -z "$GITEE_SSH_KEY" ]; then
            echo "⚠️ GITEE_SSH_KEY 未配置，跳过此仓库"
            echo "请在 Settings > Secrets 中添加 GITEE_SSH_KEY"
            echo "📖 参考：docs/Gitee-Sync-Guide.md"
            exit 0
          fi
          
          # 配置 SSH
          mkdir -p ~/.ssh
          echo "$GITEE_SSH_KEY" > ~/.ssh/id_ed25519_gitee
          chmod 600 ~/.ssh/id_ed25519_gitee
          
          # 配置 SSH 使用 Gitee 密钥
          cat >> ~/.ssh/config << EOF
          Host gitee.com
              HostName gitee.com
              PreferredAuthentications publickey
              IdentityFile ~/.ssh/id_ed25519_gitee
              StrictHostKeyChecking no
          EOF
          
          ssh-keyscan gitee.com >> ~/.ssh/known_hosts 2>/dev/null
          
          # 克隆 Wiki 仓库 (SSH)
          git clone git@gitee.com:mc_shengxia/SVL-StardewValleyLauncher.wiki.git gitee-wiki-temp
          
          # 进入目录
          cd gitee-wiki-temp
          
          # 删除旧文件（保留 .git 目录以保持历史）
          find . -maxdepth 1 -not -name '.git' -not -name '.' | xargs rm -rf
          
          # 复制扁平化后的文件（使用绝对路径）
          cp -r ${GITHUB_WORKSPACE}/wiki-output/* .
          
          # 提交
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "docs: 自动同步 - $(date '+%Y-%m-%d %H:%M:%S')"
          
          # 拉取远程更改并推送（保持历史）
          git pull --rebase git@gitee.com:mc_shengxia/SVL-StardewValleyLauncher.wiki.git master || true
          git push git@gitee.com:mc_shengxia/SVL-StardewValleyLauncher.wiki.git HEAD:master
          
          echo "✅ Gitee Wiki 同步完成"
          echo "📖 查看：https://gitee.com/mc_shengxia/SVL-StardewValleyLauncher/wikis"

      - name: Summary
        run: |
          echo "## Wiki 同步完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ SVL-Wiki Wiki: https://github.com/${{ github.repository }}/wiki" >> $GITHUB_STEP_SUMMARY
          echo "✅ SVL-StardewValleyLauncher Wiki: https://github.com/panda-lsy/SVL-StardewValleyLauncher/wiki" >> $GITHUB_STEP_SUMMARY
          echo "✅ Gitee Wiki: https://gitee.com/mc_shengxia/SVL-StardewValleyLauncher/wikis" >> $GITHUB_STEP_SUMMARY
