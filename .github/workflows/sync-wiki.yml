name: Sync Wiki

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'images/**'
      - '*.md'
      - '.github/workflows/sync-wiki.yml'
  workflow_dispatch:  # 手动触发

permissions:
  contents: write

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Prepare flattened wiki files
        run: |
          echo "📦 准备扁平化的 Wiki 文件..."
          
          # 创建临时目录
          mkdir -p wiki-output
          
          # 复制 images 文件夹
          cp -r images wiki-output/
          
          # 创建链接映射文件
          declare -A file_map
          
          # 处理根目录的 MD 文件
          for file in *.md; do
            if [ -f "$file" ]; then
              if [ "$file" = "README.md" ]; then
                cp "$file" wiki-output/Home.md
                file_map["./README"]="Home"
                file_map["README"]="Home"
              else
                base=$(basename "$file" .md)
                cp "$file" "wiki-output/$file"
                file_map["./$base"]="$base"
                file_map["$base"]="$base"
              fi
            fi
          done
          
          # 处理 docs 目录下的文件（扁平化）
          find docs -name "*.md" -type f | while read file; do
            # 移除 docs/ 前缀和 .md 后缀
            relative=${file#docs/}
            relative=${relative%.md}
            # 替换 / 为 -
            flat_name=${relative//\//-}
            
            cp "$file" "wiki-output/${flat_name}.md"
            
            # 添加到映射
            echo "./docs/$relative" >> /tmp/link_map.txt
            echo "$flat_name" >> /tmp/link_map.txt
            echo "docs/$relative" >> /tmp/link_map.txt
            echo "$flat_name" >> /tmp/link_map.txt
          done
          
          # 更新所有链接
          echo "📝 更新链接引用..."
          cd wiki-output
          for md_file in *.md; do
            if [ -f "$md_file" ]; then
              # 更新 docs/ 路径的链接
              sed -i -E 's|\[([^\]]+)\]\(\.?/?docs/([^)]+)\)|[\1](\2)|g' "$md_file"
              sed -i -E 's|\[([^\]]+)\]\(\.?/?docs/([^)]+)\.md\)|[\1](\2)|g' "$md_file"
              
              # 替换路径中的 / 为 -
              sed -i -E 's|\[([^\]]+)\]\((tutorials|features|development|CONTRIBUTING)/([^)]+)\)|[\1](\2-\3)|g' "$md_file"
              sed -i -E 's|\[([^\]]+)\]\((tutorials|features|development|CONTRIBUTING)/([^)]+)\.md\)|[\1](\2-\3)|g' "$md_file"
              
              # 更新 README 链接为 Home
              sed -i -E 's|\[([^\]]+)\]\(\.?/?README\)|[\1](Home)|g' "$md_file"
              sed -i -E 's|\[([^\]]+)\]\(\.?/?README\.md\)|[\1](Home)|g' "$md_file"
            fi
          done
          
          echo "✅ 文件准备完成"
          ls -la wiki-output/
      
      - name: Sync to SVL-Wiki Wiki
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "📦 同步到 SVL-Wiki Wiki..."
          
          # 克隆 Wiki 仓库
          git clone https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.wiki.git wiki-temp
          
          # 进入目录
          cd wiki-temp
          
          # 删除旧文件（保留 .git 目录以保持历史）
          find . -maxdepth 1 -not -name '.git' -not -name '.' | xargs rm -rf
          
          # 复制扁平化后的文件
          cp -r wiki-output/* .
          
          # 提交
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "docs: 自动同步 - $(date '+%Y-%m-%d %H:%M:%S')"
          
          # 拉取远程更改并推送（保持历史）
          git pull --rebase https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.wiki.git master || true
          git push https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.wiki.git HEAD:master
          
          echo "✅ SVL-Wiki Wiki 同步完成"

      - name: Sync to SVL-StardewValleyLauncher Wiki
        env:
          SSH_KEY: ${{ secrets.SVL_WIKI_SSH_KEY }}
        run: |
          echo "📦 同步到 SVL-StardewValleyLauncher Wiki..."
          
          if [ -z "$SSH_KEY" ]; then
            echo "⚠️ SVL_WIKI_SSH_KEY 未配置，跳过此仓库"
            echo "请在 Settings > Secrets 中添加 SVL_WIKI_SSH_KEY"
            exit 0
          fi
          
          # 配置 SSH
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          
          # 克隆 Wiki 仓库 (SSH)
          git clone git@github.com:panda-lsy/SVL-StardewValleyLauncher.wiki.git launcher-wiki-temp
          
          # 进入目录
          cd launcher-wiki-temp
          
          # 删除旧文件（保留 .git 目录以保持历史）
          find . -maxdepth 1 -not -name '.git' -not -name '.' | xargs rm -rf
          
          # 复制扁平化后的文件
          cp -r wiki-output/* .
          
          # 提交
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "docs: 自动同步 - $(date '+%Y-%m-%d %H:%M:%S')"
          
          # 拉取远程更改并推送（保持历史）
          git pull --rebase git@github.com:panda-lsy/SVL-StardewValleyLauncher.wiki.git master || true
          git push git@github.com:panda-lsy/SVL-StardewValleyLauncher.wiki.git HEAD:master
          
          echo "✅ SVL-StardewValleyLauncher Wiki 同步完成"

      - name: Summary
        run: |
          echo "## Wiki 同步完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ SVL-Wiki Wiki: https://github.com/${{ github.repository }}/wiki" >> $GITHUB_STEP_SUMMARY
          echo "✅ SVL-StardewValleyLauncher Wiki: https://github.com/panda-lsy/SVL-StardewValleyLauncher/wiki" >> $GITHUB_STEP_SUMMARY
