name: Sync Wiki

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'images/**'
      - '*.md'
      - '.github/workflows/sync-wiki.yml'
  workflow_dispatch:  # 手动触发

permissions:
  contents: write

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync to SVL-Wiki Wiki
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "📦 同步到 SVL-Wiki Wiki..."
          
          # 克隆 Wiki 仓库
          git clone https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.wiki.git wiki-temp
          
          # 进入目录
          cd wiki-temp
          
          # 删除旧文件（保留 .git 目录以保持历史）
          ls -A | grep -v '^\.git$' | xargs rm -rf
          
          # 复制新文件
          cp -r $GITHUB_WORKSPACE/*.md .
          cp -r $GITHUB_WORKSPACE/docs .
          cp -r $GITHUB_WORKSPACE/images .
          
          # 重命名 README.md 为 Home.md
          if [ -f README.md ]; then
            mv README.md Home.md
          fi
          
          # 提交
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "docs: 自动同步 - $(date '+%Y-%m-%d %H:%M:%S')"
          
          # 拉取远程更改并推送（保持历史）
          git pull --rebase https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.wiki.git master || true
          git push https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.wiki.git HEAD:master
          
          echo "✅ SVL-Wiki Wiki 同步完成"

      - name: Sync to SVL-StardewValleyLauncher Wiki
        env:
          SSH_KEY: ${{ secrets.SVL_WIKI_SSH_KEY }}
        run: |
          echo "📦 同步到 SVL-StardewValleyLauncher Wiki..."
          
          if [ -z "$SSH_KEY" ]; then
            echo "⚠️ SVL_WIKI_SSH_KEY 未配置，跳过此仓库"
            echo "请在 Settings > Secrets 中添加 SVL_WIKI_SSH_KEY"
            exit 0
          fi
          
          # 配置 SSH
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          
          # 克隆 Wiki 仓库 (SSH)
          git clone git@github.com:panda-lsy/SVL-StardewValleyLauncher.wiki.git launcher-wiki-temp
          
          # 进入目录
          cd launcher-wiki-temp
          
          # 删除旧文件（保留 .git 目录以保持历史）
          ls -A | grep -v '^\.git$' | xargs rm -rf
          
          # 复制新文件
          cp -r $GITHUB_WORKSPACE/*.md .
          cp -r $GITHUB_WORKSPACE/docs .
          cp -r $GITHUB_WORKSPACE/images .
          
          # 重命名 README.md 为 Home.md
          if [ -f README.md ]; then
            mv README.md Home.md
          fi
          
          # 提交
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "docs: 自动同步 - $(date '+%Y-%m-%d %H:%M:%S')"
          
          # 拉取远程更改并推送（保持历史）
          git pull --rebase git@github.com:panda-lsy/SVL-StardewValleyLauncher.wiki.git master || true
          git push git@github.com:panda-lsy/SVL-StardewValleyLauncher.wiki.git HEAD:master
          
          echo "✅ SVL-StardewValleyLauncher Wiki 同步完成"

      - name: Summary
        run: |
          echo "## Wiki 同步完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ SVL-Wiki Wiki: https://github.com/${{ github.repository }}/wiki" >> $GITHUB_STEP_SUMMARY
          echo "✅ SVL-StardewValleyLauncher Wiki: https://github.com/panda-lsy/SVL-StardewValleyLauncher/wiki" >> $GITHUB_STEP_SUMMARY
